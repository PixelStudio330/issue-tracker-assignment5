<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/v1/geist-sans.css" />
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl login-card-shadow border border-gray-100 w-full max-w-md">
        
        <div class="flex flex-col items-center mb-8">
            <img src="github-logo.png" alt="GitHub Logo" class="w-20 h-20 mb-4">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div class="form-control w-full">
                <label class="label pt-0">
                    <span class="label-text font-semibold text-gray-700">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full focus:outline-none focus:border-indigo-500" required />
                <label class="label">
                    <span class="label-text-alt text-[#4A00FF]">Default: admin</span>
                </label>
            </div>

            <div class="form-control w-full">
                <label class="label pt-0">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full focus:outline-none focus:border-indigo-500" required />
                <label class="label">
                    <span class="label-text-alt text-[#4A00FF]">Default: admin123</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-full bg-[#4A00FF] hover:bg-indigo-700 border-none text-white normal-case text-lg">
                Sign In
            </button>
        </form>

        <div class="divider my-8 text-gray-400 text-[10px] tracking-widest font-medium">OR</div>

        <div class="flex flex-col items-center">
            <p class="text-gray-400 text-xs mb-3 font-medium">Demo Credentials:</p>
            
            <div class="bg-slate-50 p-6 rounded-lg border border-gray-100 text-center w-full">
                <p class="text-gray-700 text-sm leading-relaxed">
                    <span class="font-bold">Username:</span> admin<br>
                    <span class="font-bold">Password:</span> admin123
                </p>
            </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
