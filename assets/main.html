<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/v1/geist-sans.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#F8F9FA] min-h-screen pb-12">

    <nav class="bg-white border-b border-gray-100 py-4 px-6 md:px-16 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="github-logo.png" class="w-8 h-8" alt="Logo">
            <span class="text-xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</span>
        </div>
        
        <div class="flex items-center gap-4 w-full max-w-md ml-auto">
    <div class="relative w-full">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input 
            type="text" 
            id="searchInput" 
            oninput="handleSearchInput(event)" 
            placeholder="Search issues..." 
            class="input input-bordered w-full pl-10 h-11 bg-white focus:outline-none focus:border-[#4A00FF] border-gray-200 transition-colors"
        >
    </div>
    <button class="btn btn-primary bg-[#4A00FF] hover:bg-indigo-700 border-none text-white normal-case h-11 min-h-0 px-6 font-semibold">+ New Issue</button>
</div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-6 md:px-10 mt-10">
        <div class="bg-white rounded-xl border border-gray-100 p-2 mb-8 shadow-sm flex gap-2 w-full">
            <button onclick="filterIssues('all')" id="tab-all" class="tab-btn px-8 py-2.5 rounded-lg font-bold transition-all bg-[#4A00FF] text-white">All</button>
            <button onclick="filterIssues('open')" id="tab-open" class="tab-btn px-8 py-2.5 rounded-lg font-bold transition-all text-gray-500 hover:bg-gray-50">Open</button>
            <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn px-8 py-2.5 rounded-lg font-bold transition-all text-gray-500 hover:bg-gray-50">Closed</button>
        </div>

        <div class="bg-white rounded-t-2xl border-x border-t border-gray-100 p-8 flex justify-between items-center shadow-sm">
            <div id="issueCountText"></div> 
            <div class="flex gap-8 text-sm font-bold text-gray-700">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#10B981]"></span> Open</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#8B5CF6]"></span> Closed</span>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6 bg-white border border-gray-100 rounded-b-2xl shadow-sm min-h-[500px]">
            <div id="loader" class="col-span-full flex justify-center items-center py-24">
                <span class="loading loading-spinner loading-lg text-[#4A00FF]"></span>
            </div>
        </div>
    </main>

    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl bg-white p-8 rounded-2xl shadow-2xl overflow-hidden" id="modalContent"></div>
        <form method="dialog" class="modal-backdrop"><button>close </button></form>
    </dialog>

    <script src="dashboard.js"></script>
</body>
</html>
